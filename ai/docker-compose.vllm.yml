services:
  vllm-qwen:
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen
    restart: unless-stopped
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    ports:
      - "8002:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model Qwen/Qwen3-4B-A3B-Instruct
      --dtype float16
      --max-model-len 8192
      --gpu-memory-utilization 0.5

  vllm-llama:
    image: vllm/vllm-openai:latest
    container_name: vllm-llama
    restart: unless-stopped
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    ports:
      - "8003:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    command: >
      --model meta-llama/Llama-3.2-3B-Instruct-AWQ
      --dtype float16
      --max-model-len 8192
      --gpu-memory-utilization 0.5

volumes:
  vllm_data:
