  vllm-qwen:
    networks:
      - shared
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen
    restart: unless-stopped
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    ports:
      - "${PORT_VLLM_QWEN}:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    command: >
      --model Qwen/Qwen3.6-35B-A3B
      --max-model-len 262144
      --reasoning-parser qwen3 
      --speculative-config '{"method":"qwen3_next_mtp","num_speculative_tokens":2}'
      --dtype float16
      --gpu-memory-utilization 0.8

  vllm-qwen-vl:
    networks:
      - shared
    image: vllm/vllm-openai:latest
    container_name: vllm-qwen-vl
    restart: unless-stopped
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    ports:
      - "${PORT_VLLM_QWEN_VL}:8000"
    volumes:
      - vllm_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 180s
    command: >
      --model Qwen/Qwen2.5-VL-7B-Instruct
      --dtype float16
      --max-model-len 8192
      --gpu-memory-utilization 0.4

volumes:
  vllm_data:
