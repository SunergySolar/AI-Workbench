networks:
  shared:
    external: true
    name: ai_shared

services:
  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    networks:
      - shared
    container_name: openwebui
    restart: unless-stopped
    ports:
      - "${PORT_OPENWEBUI}:8080"
    environment:
      # All values are sourced from .env — edit there, not here.
      OPENAI_API_BASE_URL: "${OPENWEBUI_OPENAI_API_BASE_URL}"
      OPENAI_API_KEY: "${DEFAULT_LITELLM_MASTER_KEY}"
      ENABLE_OLLAMA_API: "${OPENWEBUI_ENABLE_OLLAMA_API}"
      WEBUI_SECRET_KEY: "${OPENWEBUI_SECRET_KEY}"
      ENABLE_SIGNUP: "${OPENWEBUI_ENABLE_SIGNUP}"
      DEFAULT_USER_ROLE: "${OPENWEBUI_DEFAULT_USER_ROLE}"
      CORS_ALLOW_ORIGIN: "${CORS_ALLOW_ORIGIN}"
      HF_TOKEN: "${HF_TOKEN}"
    volumes:
      - openwebui_data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8080/health')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  openwebui_data:
