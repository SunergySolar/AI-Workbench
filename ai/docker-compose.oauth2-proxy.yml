networks:
  shared:
    external: true
    name: ai_shared

services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    networks:
      - shared
    restart: unless-stopped
    volumes:
      - ./oauth2-proxy/sa-key.json:/etc/oauth2-proxy/sa-key.json:ro
    environment:
      # All values are sourced from .env — edit there, not here.

      # Provider + listener
      OAUTH2_PROXY_PROVIDER: "${OAUTH2_PROXY_PROVIDER}"
      OAUTH2_PROXY_HTTP_ADDRESS: "${OAUTH2_PROXY_HTTP_ADDRESS}"
      OAUTH2_PROXY_REVERSE_PROXY: "${OAUTH2_PROXY_REVERSE_PROXY}"

      # Identity headers passed to Open WebUI
      OAUTH2_PROXY_PASS_USER_HEADERS: "${OAUTH2_PROXY_PASS_USER_HEADERS}"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "${OAUTH2_PROXY_SET_XAUTHREQUEST}"

      # OAuth client — reused from Open WebUI's Google OAuth 2.0 client.
      OAUTH2_PROXY_CLIENT_ID: "${OPENWEBUI_GOOGLE_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${OPENWEBUI_GOOGLE_CLIENT_SECRET}"

      # Session / cookie config
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_COOKIE_DOMAINS: "${OAUTH2_PROXY_COOKIE_DOMAINS}"
      OAUTH2_PROXY_COOKIE_EXPIRE: "${OAUTH2_PROXY_COOKIE_EXPIRE}"
      OAUTH2_PROXY_COOKIE_REFRESH: "${OAUTH2_PROXY_COOKIE_REFRESH}"

      # Routing
      OAUTH2_PROXY_UPSTREAMS: "${OAUTH2_PROXY_UPSTREAMS}"
      OAUTH2_PROXY_REDIRECT_URL: "${OAUTH2_PROXY_REDIRECT_URL}"
      OAUTH2_PROXY_WHITELIST_DOMAINS: "${OAUTH2_PROXY_WHITELIST_DOMAINS}"

      # Access rules — Google Workspace domain + group gating
      OAUTH2_PROXY_EMAIL_DOMAINS: "${OAUTH2_PROXY_EMAIL_DOMAINS}"
      OAUTH2_PROXY_GOOGLE_GROUPS: "${OAUTH2_PROXY_GOOGLE_GROUPS}"
      OAUTH2_PROXY_GOOGLE_ADMIN_EMAIL: "${OAUTH2_PROXY_GOOGLE_ADMIN_EMAIL}"
      OAUTH2_PROXY_GOOGLE_SERVICE_ACCOUNT_JSON: "${OAUTH2_PROXY_GOOGLE_SERVICE_ACCOUNT_JSON}"
