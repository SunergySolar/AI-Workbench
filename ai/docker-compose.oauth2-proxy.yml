networks:
  shared:
    external: true
    name: ai_shared

services:
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:latest
    container_name: oauth2-proxy
    networks:
      - shared
    restart: unless-stopped
    volumes:
      - ./oauth2-proxy/sa-key.json:/etc/oauth2-proxy/sa-key.json:ro
    environment:
      OAUTH2_PROXY_PROVIDER: google
      OAUTH2_PROXY_CLIENT_ID: "${OPENWEBUI_GOOGLE_CLIENT_ID}"
      OAUTH2_PROXY_CLIENT_SECRET: "${OPENWEBUI_GOOGLE_CLIENT_SECRET}"
      OAUTH2_PROXY_COOKIE_SECRET: "${OAUTH2_PROXY_COOKIE_SECRET}"
      OAUTH2_PROXY_EMAIL_DOMAINS: "zeoenergy.com"
      OAUTH2_PROXY_UPSTREAMS: "http://openwebui:8080"
      OAUTH2_PROXY_HTTP_ADDRESS: "0.0.0.0:4180"
      OAUTH2_PROXY_REVERSE_PROXY: "true"
      OAUTH2_PROXY_REDIRECT_URL: "https://chat.zeoenergy.com/oauth2/callback"
      OAUTH2_PROXY_COOKIE_DOMAINS: "chat.zeoenergy.com"
      OAUTH2_PROXY_WHITELIST_DOMAINS: "chat.zeoenergy.com"
      OAUTH2_PROXY_GOOGLE_GROUPS: "zeoai.access@zeoenergy.com"
      OAUTH2_PROXY_GOOGLE_ADMIN_EMAIL: "admin@gosunergy.com"
      OAUTH2_PROXY_GOOGLE_SERVICE_ACCOUNT_JSON: "/etc/oauth2-proxy/sa-key.json"
      OAUTH2_PROXY_COOKIE_EXPIRE: "1h"
      OAUTH2_PROXY_COOKIE_REFRESH: "15m"
      OAUTH2_PROXY_PASS_USER_HEADERS: "true"
      OAUTH2_PROXY_SET_XAUTHREQUEST: "true"
