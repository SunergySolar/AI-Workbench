networks:
  shared:
    external: true
    name: ai_shared

services:
  quality-checker:
    networks:
      - shared
    build:
      context: .
      dockerfile: quality-checker/Dockerfile
    container_name: quality-checker
    restart: unless-stopped
    ports:
      - "${PORT_QUALITY_CHECKER}:8000"
    environment:
      - VLLM_QWEN_VL_API=http://vllm-qwen-vl:8000/v1/chat/completions
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      vllm-qwen-vl:
        condition: service_healthy
