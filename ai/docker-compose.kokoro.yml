name: ai-kokoro

networks:
  shared:
    external: true
    name: ai_shared

services:
  kokoro-app:
    networks:
      - shared
    build:
      context: .
      dockerfile: Dockerfile.kokoro-app
    container_name: kokoro-app
    restart: unless-stopped
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN}
    volumes:
      - kokoro_data:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  kokoro-api:
    networks:
      - shared
    build:
      context: .
      dockerfile: Dockerfile.kokoro-api
    container_name: kokoro-api
    restart: unless-stopped
    environment:
      - KOKORO_APP_URL=${KOKORO_APP_URL}
    ports:
      - "8004:8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    depends_on:
      - kokoro-app


volumes:
  kokoro_data:
