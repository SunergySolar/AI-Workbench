networks:
  shared:
    external: true
    name: ai_shared

services:
  unsloth:
    networks:
      - shared
    # Uncomment the build section if you want to build the image locally using a Dockerfile
    # Comment the image section if you are building the image locally
    # build:
    #   context: .
    #   dockerfile: Dockerfile.unsloth
    image: unsloth/unsloth:latest
    container_name: unsloth
    restart: unless-stopped
    environment:
      - JUPYTER_PASSWORD=mypassword
    ports:
      - "8888:8888"
      - "8000:8000"
      - "2222:22"
    volumes:
      - ./work:/workspace/work
      - unsloth_data:/home/unsloth/.unsloth
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  unsloth_data:
